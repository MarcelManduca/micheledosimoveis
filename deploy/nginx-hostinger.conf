# Reverse proxy Nginx para o site Michele dos Imóveis em uma VPS Hostinger.
# Caminho típico: /etc/nginx/sites-available/micheledosimoveis.conf
# Depois: ln -s ../sites-available/micheledosimoveis.conf /etc/nginx/sites-enabled/
#         nginx -t && systemctl reload nginx
#         certbot --nginx -d micheledosimoveis.com.br -d www.micheledosimoveis.com.br

server {
    listen 80;
    listen [::]:80;
    server_name micheledosimoveis.com.br www.micheledosimoveis.com.br;

    # Redirecionar para HTTPS após Certbot rodar (descomente):
    # return 301 https://$host$request_uri;

    client_max_body_size 25M;

    # Cache agressivo para assets versionados do Vite
    location /_build/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /assets/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
